<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artone - Professional Video Editor</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .logo {
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }
        
        input[type="range"]::-webkit-slider-track {
            background: #374151;
            height: 4px;
            border-radius: 2px;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            background: #3b82f6;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            margin-top: -4px;
        }
        
        .timeline-clip {
            transition: opacity 0.2s;
        }
        
        .timeline-clip:hover {
            opacity: 0.8;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .recording {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, memo } = React;
        
        // ====================
        // Artone Video Editor - Electron版
        // ====================
        
        const utils = {
            generateId: () => Math.random().toString(36).substr(2, 9),
            showToast: (message, type = 'info') => {
                const toast = document.createElement('div');
                toast.className = `fixed bottom-4 right-4 px-4 py-2 rounded-lg text-white ${
                    type === 'success' ? 'bg-green-600' : 
                    type === 'error' ? 'bg-red-600' : 'bg-blue-600'
                } z-50 animate-pulse`;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            },
            clamp: (value, min, max) => Math.max(min, Math.min(max, value)),
            formatTime: (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                const frames = Math.floor((seconds % 1) * 30);
                return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}.${String(frames).padStart(2, '0')}`;
            },
            // Electronファイル処理用
            loadFileAsBlob: async (filePath) => {
                if (window.electronAPI) {
                    const fileUrl = window.nodeAPI.pathToFileURL(filePath);
                    const response = await fetch(fileUrl);
                    return await response.blob();
                }
                return null;
            }
        };
        
        // Project Management
        class Project {
            constructor() {
                this.id = utils.generateId();
                this.name = '新規プロジェクト';
                this.duration = 0;
                this.resolution = { width: 1920, height: 1080 };
                this.framerate = 30;
                this.tracks = [];
                this.media = [];
            }
            
            addTrack(type = 'video') {
                const track = {
                    id: utils.generateId(),
                    type,
                    name: `${type === 'video' ? 'ビデオ' : type === 'audio' ? 'オーディオ' : 'テキスト'}トラック ${this.tracks.filter(t => t.type === type).length + 1}`,
                    clips: [],
                    visible: true,
                    locked: false
                };
                this.tracks.push(track);
                return track;
            }
            
            addClip(trackId, mediaId, position = 0) {
                const track = this.tracks.find(t => t.id === trackId);
                const media = this.media.find(m => m.id === mediaId);
                
                if (!track || !media) return null;
                
                const clip = {
                    id: utils.generateId(),
                    mediaId,
                    type: media.type,
                    name: media.name,
                    position,
                    inPoint: 0,
                    outPoint: media.duration || 5,
                    properties: {
                        volume: 1,
                        opacity: 1,
                        scale: 1,
                        rotation: 0,
                        text: media.type === 'text' ? 'New Text' : undefined
                    },
                    effects: {
                        brightness: 100,
                        contrast: 100,
                        saturation: 100,
                        blur: 0
                    },
                    visible: true
                };
                
                track.clips.push(clip);
                this.updateDuration();
                return clip;
            }
            
            updateDuration() {
                let maxEnd = 0;
                this.tracks.forEach(track => {
                    track.clips.forEach(clip => {
                        const end = clip.position + (clip.outPoint - clip.inPoint);
                        maxEnd = Math.max(maxEnd, end);
                    });
                });
                this.duration = maxEnd;
            }
            
            // プロジェクト保存・読み込み
            serialize() {
                return JSON.stringify({
                    id: this.id,
                    name: this.name,
                    duration: this.duration,
                    resolution: this.resolution,
                    framerate: this.framerate,
                    tracks: this.tracks,
                    media: this.media.map(m => ({
                        ...m,
                        url: m.filePath || m.url // ファイルパスを保存
                    }))
                });
            }
            
            static deserialize(data) {
                const parsed = JSON.parse(data);
                const project = new Project();
                Object.assign(project, parsed);
                return project;
            }
        }
        
        // Video Exporter
        class VideoExporter {
            async exportProject(project, canvas, options = {}) {
                const { videoBitrate = 2500000, framerate = 30, onProgress } = options;
                
                try {
                    const stream = canvas.captureStream(framerate);
                    const mediaRecorder = new MediaRecorder(stream, {
                        mimeType: 'video/webm',
                        videoBitsPerSecond: videoBitrate
                    });
                    
                    const chunks = [];
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };
                    
                    return new Promise((resolve, reject) => {
                        mediaRecorder.onstop = () => {
                            const blob = new Blob(chunks, { type: 'video/webm' });
                            resolve(blob);
                        };
                        
                        mediaRecorder.start();
                        
                        this.renderFrames(project, canvas, framerate, onProgress).then(() => {
                            mediaRecorder.stop();
                        });
                    });
                } catch (error) {
                    throw new Error('エクスポートに失敗しました: ' + error.message);
                }
            }
            
            async renderFrames(project, canvas, framerate, onProgress) {
                const ctx = canvas.getContext('2d');
                const frameCount = Math.ceil(project.duration * framerate);
                
                for (let i = 0; i < frameCount; i++) {
                    const time = i / framerate;
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // Render clips
                    for (const track of project.tracks) {
                        if (!track.visible) continue;
                        
                        for (const clip of track.clips) {
                            const clipStart = clip.position;
                            const clipEnd = clipStart + (clip.outPoint - clip.inPoint);
                            
                            if (time >= clipStart && time < clipEnd) {
                                const relativeTime = time - clipStart + clip.inPoint;
                                await this.renderClip(ctx, clip, project, relativeTime, canvas);
                            }
                        }
                    }
                    
                    if (onProgress) onProgress((i / frameCount) * 100);
                    await new Promise(resolve => setTimeout(resolve, 1000 / framerate));
                }
            }
            
            async renderClip(ctx, clip, project, time, canvas) {
                const media = project.media.find(m => m.id === clip.mediaId);
                if (!media) return;
                
                ctx.save();
                ctx.globalAlpha = clip.properties.opacity;
                
                if (clip.effects.blur > 0) {
                    ctx.filter = `blur(${clip.effects.blur}px)`;
                }
                
                if (media.type === 'video') {
                    const video = document.createElement('video');
                    video.src = media.url;
                    video.currentTime = time;
                    
                    await new Promise(resolve => {
                        video.onseeked = () => {
                            const scale = clip.properties.scale;
                            const w = canvas.width * scale;
                            const h = canvas.height * scale;
                            const x = (canvas.width - w) / 2;
                            const y = (canvas.height - h) / 2;
                            
                            ctx.drawImage(video, x, y, w, h);
                            resolve();
                        };
                    });
                } else if (media.type === 'image') {
                    const img = new Image();
                    img.src = media.url;
                    await new Promise(resolve => {
                        img.onload = () => {
                            const scale = clip.properties.scale;
                            const w = canvas.width * scale;
                            const h = canvas.height * scale;
                            const x = (canvas.width - w) / 2;
                            const y = (canvas.height - h) / 2;
                            
                            ctx.drawImage(img, x, y, w, h);
                            resolve();
                        };
                    });
                } else if (media.type === 'text') {
                    ctx.font = '48px Arial';
                    ctx.fillStyle = '#ffffff';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(clip.properties.text || 'Text', canvas.width / 2, canvas.height / 2);
                }
                
                ctx.restore();
            }
        }
        
        // Timeline Ruler Component
        const TimelineRuler = ({ duration, zoom, currentTime, onClick }) => {
            const marks = [];
            const step = zoom < 50 ? 5 : 1;
            
            for (let i = 0; i <= duration; i += step) {
                marks.push(
                    <div
                        key={i}
                        className="absolute text-xs text-gray-500"
                        style={{ left: `${i * zoom}px` }}
                    >
                        {i}s
                    </div>
                );
            }
            
            return (
                <div
                    className="relative h-6 bg-gray-900 border-b border-gray-700 cursor-pointer"
                    onClick={(e) => {
                        const rect = e.currentTarget.getBoundingClientRect();
                        const time = (e.clientX - rect.left) / zoom;
                        onClick(utils.clamp(time, 0, duration));
                    }}
                >
                    {marks}
                    <div
                        className="absolute top-0 w-0.5 h-full bg-red-500"
                        style={{ left: `${currentTime * zoom}px` }}
                    />
                </div>
            );
        };
        
        // Main Artone Component
        const Artone = () => {
            const [project, setProject] = useState(() => new Project());
            const [currentTime, setCurrentTime] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [selectedClip, setSelectedClip] = useState(null);
            const [zoom, setZoom] = useState(30);
            const [exportProgress, setExportProgress] = useState(0);
            const [isExporting, setIsExporting] = useState(false);
            
            const previewRef = useRef(null);
            const fileInputRef = useRef(null);
            const exporter = useRef(new VideoExporter());
            
            // Initialize project
            useEffect(() => {
                project.addTrack('video');
                project.addTrack('video');
                project.addTrack('audio');
                project.addTrack('text');
            }, []);
            
            // Electronメニューイベントの処理
            useEffect(() => {
                if (!window.electronAPI) return;
                
                const handleMenuAction = async (event, ...args) => {
                    const action = event.type;
                    
                    switch (action) {
                        case 'menu-new-project':
                            setProject(new Project());
                            setCurrentTime(0);
                            setSelectedClip(null);
                            utils.showToast('新規プロジェクトを作成しました', 'success');
                            break;
                            
                        case 'menu-save-project':
                            await handleSaveProject();
                            break;
                            
                        case 'menu-open-project':
                            await handleOpenProject(args[0]);
                            break;
                            
                        case 'menu-import-media':
                            await handleElectronFileUpload(args[0]);
                            break;
                            
                        case 'menu-export':
                            await handleExport();
                            break;
                            
                        case 'menu-add-text':
                            handleAddText();
                            break;
                            
                        case 'menu-play-pause':
                            setIsPlaying(prev => !prev);
                            break;
                            
                        case 'menu-zoom-in':
                            setZoom(prev => Math.min(100, prev + 10));
                            break;
                            
                        case 'menu-zoom-out':
                            setZoom(prev => Math.max(10, prev - 10));
                            break;
                            
                        case 'menu-go-to-start':
                            setCurrentTime(0);
                            break;
                            
                        case 'menu-go-to-end':
                            setCurrentTime(project.duration);
                            break;
                    }
                };
                
                window.electronAPI.onMenuAction(handleMenuAction);
                
                return () => {
                    window.electronAPI.removeMenuListeners();
                };
            }, [project]);
            
            // プロジェクト保存
            const handleSaveProject = async () => {
                if (!window.electronAPI) return;
                
                try {
                    const result = await window.electronAPI.showSaveDialog([
                        { name: 'Artone Project', extensions: ['artone'] },
                        { name: 'JSON Files', extensions: ['json'] }
                    ]);
                    
                    if (!result.canceled) {
                        const data = project.serialize();
                        const writeResult = await window.electronAPI.writeFile(result.filePath, data);
                        
                        if (writeResult.success) {
                            project.name = window.nodeAPI.path.basename(result.filePath, '.artone');
                            setProject({...project});
                            utils.showToast('プロジェクトを保存しました', 'success');
                        } else {
                            utils.showToast('保存に失敗しました: ' + writeResult.error, 'error');
                        }
                    }
                } catch (error) {
                    utils.showToast('保存エラー: ' + error.message, 'error');
                }
            };
            
            // プロジェクト読み込み
            const handleOpenProject = async (filePath) => {
                if (!window.electronAPI || !filePath) return;
                
                try {
                    const readResult = await window.electronAPI.readFile(filePath);
                    
                    if (readResult.success) {
                        const loadedProject = Project.deserialize(readResult.data.toString());
                        
                        // メディアファイルのURLを更新
                        for (const media of loadedProject.media) {
                            if (media.filePath) {
                                media.url = window.nodeAPI.pathToFileURL(media.filePath);
                            }
                        }
                        
                        setProject(loadedProject);
                        setCurrentTime(0);
                        setSelectedClip(null);
                        utils.showToast('プロジェクトを読み込みました', 'success');
                    } else {
                        utils.showToast('読み込みに失敗しました: ' + readResult.error, 'error');
                    }
                } catch (error) {
                    utils.showToast('読み込みエラー: ' + error.message, 'error');
                }
            };
            
            // Electronファイルアップロード
            const handleElectronFileUpload = async (filePaths) => {
                if (!filePaths || filePaths.length === 0) return;
                
                for (const filePath of filePaths) {
                    const fileName = window.nodeAPI.path.basename(filePath);
                    const ext = window.nodeAPI.path.extname(filePath).toLowerCase();
                    
                    let type = 'image';
                    if (['.mp4', '.avi', '.mov', '.webm'].includes(ext)) {
                        type = 'video';
                    } else if (['.mp3', '.wav', '.ogg'].includes(ext)) {
                        type = 'audio';
                    }
                    
                    const url = window.nodeAPI.pathToFileURL(filePath);
                    
                    const media = {
                        id: utils.generateId(),
                        name: fileName,
                        url,
                        filePath,
                        type,
                        duration: 0
                    };
                    
                    if (type === 'video' || type === 'audio') {
                        const element = document.createElement(type);
                        element.src = url;
                        await new Promise(resolve => {
                            element.onloadedmetadata = () => {
                                media.duration = element.duration;
                                resolve();
                            };
                        });
                    }
                    
                    project.media.push(media);
                    
                    const track = project.tracks.find(t => t.type === type);
                    if (track) {
                        project.addClip(track.id, media.id, currentTime);
                    }
                }
                
                setProject({...project});
                utils.showToast('メディアを追加しました', 'success');
            };
            
            // Handle file upload (ブラウザ版との互換性)
            const handleFileUpload = useCallback(async (e) => {
                const files = Array.from(e.target.files);
                
                for (const file of files) {
                    const url = URL.createObjectURL(file);
                    const type = file.type.startsWith('video/') ? 'video' : 
                                 file.type.startsWith('audio/') ? 'audio' : 'image';
                    
                    const media = {
                        id: utils.generateId(),
                        name: file.name,
                        url,
                        type,
                        duration: 0
                    };
                    
                    if (type === 'video' || type === 'audio') {
                        const element = document.createElement(type);
                        element.src = url;
                        await new Promise(resolve => {
                            element.onloadedmetadata = () => {
                                media.duration = element.duration;
                                resolve();
                            };
                        });
                    }
                    
                    project.media.push(media);
                    
                    const track = project.tracks.find(t => t.type === type);
                    if (track) {
                        project.addClip(track.id, media.id, currentTime);
                    }
                }
                
                setProject({...project});
                utils.showToast('メディアを追加しました', 'success');
            }, [project, currentTime]);
            
            // Playback control
            useEffect(() => {
                if (!isPlaying) return;
                
                const interval = setInterval(() => {
                    setCurrentTime(prev => {
                        const next = prev + 1 / 30;
                        return next >= project.duration ? 0 : next;
                    });
                }, 1000 / 30);
                
                return () => clearInterval(interval);
            }, [isPlaying, project.duration]);
            
            // Preview rendering
            useEffect(() => {
                if (!previewRef.current) return;
                
                const canvas = previewRef.current;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                project.tracks.forEach(track => {
                    if (!track.visible || track.type === 'audio') return;
                    
                    track.clips.forEach(clip => {
                        const clipStart = clip.position;
                        const clipEnd = clipStart + (clip.outPoint - clip.inPoint);
                        
                        if (currentTime >= clipStart && currentTime < clipEnd) {
                            const media = project.media.find(m => m.id === clip.mediaId);
                            if (!media) return;
                            
                            const relativeTime = currentTime - clipStart + clip.inPoint;
                            
                            if (media.type === 'video') {
                                const video = document.createElement('video');
                                video.src = media.url;
                                video.currentTime = relativeTime;
                                
                                video.onseeked = () => {
                                    ctx.save();
                                    ctx.globalAlpha = clip.properties.opacity;
                                    
                                    const scale = clip.properties.scale;
                                    const w = canvas.width * scale;
                                    const h = canvas.height * scale;
                                    const x = (canvas.width - w) / 2;
                                    const y = (canvas.height - h) / 2;
                                    
                                    if (clip.effects.blur > 0) {
                                        ctx.filter = `blur(${clip.effects.blur}px)`;
                                    }
                                    
                                    ctx.drawImage(video, x, y, w, h);
                                    ctx.restore();
                                };
                            } else if (media.type === 'text') {
                                ctx.save();
                                ctx.globalAlpha = clip.properties.opacity;
                                ctx.font = '48px Arial';
                                ctx.fillStyle = '#ffffff';
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                ctx.fillText(clip.properties.text || 'Text', canvas.width / 2, canvas.height / 2);
                                ctx.restore();
                            }
                        }
                    });
                });
            }, [currentTime, project]);
            
            // Add text
            const handleAddText = useCallback(() => {
                const textTrack = project.tracks.find(t => t.type === 'text');
                if (!textTrack) return;
                
                const textMedia = {
                    id: utils.generateId(),
                    name: 'Text',
                    type: 'text',
                    duration: 5
                };
                
                project.media.push(textMedia);
                const clip = project.addClip(textTrack.id, textMedia.id, currentTime);
                if (clip) {
                    clip.properties.text = 'New Text';
                }
                
                setProject({...project});
                utils.showToast('テキストを追加しました', 'success');
            }, [project, currentTime]);
            
            // Export video
            const handleExport = useCallback(async () => {
                setIsExporting(true);
                setExportProgress(0);
                
                try {
                    const exportCanvas = document.createElement('canvas');
                    exportCanvas.width = 1920;
                    exportCanvas.height = 1080;
                    
                    const blob = await exporter.current.exportProject(
                        project,
                        exportCanvas,
                        {
                            onProgress: setExportProgress
                        }
                    );
                    
                    if (window.electronAPI) {
                        // Electron環境での保存
                        const result = await window.electronAPI.showSaveDialog([
                            { name: 'Video Files', extensions: ['webm'] },
                            { name: 'All Files', extensions: ['*'] }
                        ]);
                        
                        if (!result.canceled) {
                            const arrayBuffer = await blob.arrayBuffer();
                            const uint8Array = new Uint8Array(arrayBuffer);
                            
                            const writeResult = await window.electronAPI.writeFile(result.filePath, uint8Array);
                            
                            if (writeResult.success) {
                                utils.showToast('エクスポート完了！', 'success');
                            } else {
                                utils.showToast('保存に失敗しました: ' + writeResult.error, 'error');
                            }
                        }
                    } else {
                        // ブラウザ環境での保存
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `Artone_${new Date().getTime()}.webm`;
                        a.click();
                        URL.revokeObjectURL(url);
                        utils.showToast('エクスポート完了！', 'success');
                    }
                } catch (error) {
                    utils.showToast('エクスポートエラー: ' + error.message, 'error');
                } finally {
                    setIsExporting(false);
                    setExportProgress(0);
                }
            }, [project]);
            
            return (
                <div className="flex flex-col h-screen bg-gray-900 text-white">
                    {/* Header */}
                    <div className="flex items-center justify-between p-4 bg-gray-800 border-b border-gray-700">
                        <div className="flex items-center gap-4">
                            <h1 className="text-2xl font-bold logo">Artone</h1>
                            <span className="text-sm text-gray-400">{project.name}</span>
                            {!window.electronAPI && (
                                <>
                                    <button
                                        onClick={() => fileInputRef.current && fileInputRef.current.click()}
                                        className="px-4 py-2 bg-blue-600 rounded hover:bg-blue-700 transition"
                                    >
                                        メディア追加
                                    </button>
                                    <button
                                        onClick={handleAddText}
                                        className="px-4 py-2 bg-purple-600 rounded hover:bg-purple-700 transition"
                                    >
                                        テキスト追加
                                    </button>
                                    <input
                                        ref={fileInputRef}
                                        type="file"
                                        multiple
                                        accept="video/*,audio/*,image/*"
                                        onChange={handleFileUpload}
                                        className="hidden"
                                    />
                                </>
                            )}
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <span className="text-sm font-mono">
                                {utils.formatTime(currentTime)}
                            </span>
                            <button
                                onClick={() => setIsPlaying(!isPlaying)}
                                className="px-4 py-2 bg-green-600 rounded hover:bg-green-700 transition"
                            >
                                {isPlaying ? '⏸ 停止' : '▶ 再生'}
                            </button>
                            {!window.electronAPI && (
                                <button
                                    onClick={handleExport}
                                    disabled={isExporting}
                                    className="px-4 py-2 bg-purple-600 rounded hover:bg-purple-700 transition disabled:opacity-50"
                                >
                                    {isExporting ? 'エクスポート中...' : '📤 エクスポート'}
                                </button>
                            )}
                        </div>
                    </div>
                    
                    {/* Main Content */}
                    <div className="flex flex-1 overflow-hidden">
                        {/* Preview */}
                        <div className="flex-1 flex items-center justify-center bg-black">
                            <canvas
                                ref={previewRef}
                                width={1280}
                                height={720}
                                className="max-w-full max-h-full"
                                style={{ backgroundColor: '#000' }}
                            />
                        </div>
                        
                        {/* Properties Panel */}
                        {selectedClip && (
                            <div className="w-80 bg-gray-800 p-4 overflow-y-auto">
                                <h3 className="text-lg font-semibold mb-4">クリップ設定</h3>
                                
                                <div className="space-y-4">
                                    {selectedClip.type === 'text' && (
                                        <div>
                                            <label className="text-sm text-gray-400">テキスト</label>
                                            <input
                                                type="text"
                                                value={selectedClip.properties.text || ''}
                                                onChange={(e) => {
                                                    selectedClip.properties.text = e.target.value;
                                                    setProject({...project});
                                                }}
                                                className="w-full p-2 bg-gray-700 rounded text-white"
                                            />
                                        </div>
                                    )}
                                    
                                    <div>
                                        <label className="text-sm text-gray-400">不透明度</label>
                                        <input
                                            type="range"
                                            min="0"
                                            max="1"
                                            step="0.01"
                                            value={selectedClip.properties.opacity}
                                            onChange={(e) => {
                                                selectedClip.properties.opacity = parseFloat(e.target.value);
                                                setProject({...project});
                                            }}
                                            className="w-full"
                                        />
                                        <span className="text-xs text-gray-500">
                                            {Math.round(selectedClip.properties.opacity * 100)}%
                                        </span>
                                    </div>
                                    
                                    <div>
                                        <label className="text-sm text-gray-400">スケール</label>
                                        <input
                                            type="range"
                                            min="0.1"
                                            max="2"
                                            step="0.01"
                                            value={selectedClip.properties.scale}
                                            onChange={(e) => {
                                                selectedClip.properties.scale = parseFloat(e.target.value);
                                                setProject({...project});
                                            }}
                                            className="w-full"
                                        />
                                        <span className="text-xs text-gray-500">
                                            {Math.round(selectedClip.properties.scale * 100)}%
                                        </span>
                                    </div>
                                    
                                    <div>
                                        <label className="text-sm text-gray-400">ブラー</label>
                                        <input
                                            type="range"
                                            min="0"
                                            max="20"
                                            step="0.5"
                                            value={selectedClip.effects.blur}
                                            onChange={(e) => {
                                                selectedClip.effects.blur = parseFloat(e.target.value);
                                                setProject({...project});
                                            }}
                                            className="w-full"
                                        />
                                        <span className="text-xs text-gray-500">
                                            {selectedClip.effects.blur}px
                                        </span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    {/* Timeline */}
                    <div className="h-64 bg-gray-800 border-t border-gray-700">
                        <div className="flex items-center justify-between p-2 border-b border-gray-700">
                            <div className="flex items-center gap-2">
                                <span className="text-sm font-mono">
                                    {utils.formatTime(currentTime)}
                                </span>
                            </div>
                            <div className="flex items-center gap-2">
                                <button
                                    onClick={() => setZoom(prev => Math.max(10, prev - 10))}
                                    className="px-2 py-1 bg-gray-700 rounded hover:bg-gray-600"
                                >
                                    −
                                </button>
                                <span className="text-sm">{zoom}px/s</span>
                                <button
                                    onClick={() => setZoom(prev => Math.min(100, prev + 10))}
                                    className="px-2 py-1 bg-gray-700 rounded hover:bg-gray-600"
                                >
                                    +
                                </button>
                            </div>
                        </div>
                        
                        <TimelineRuler
                            duration={project.duration}
                            zoom={zoom}
                            currentTime={currentTime}
                            onClick={setCurrentTime}
                        />
                        
                        {/* Tracks */}
                        <div className="overflow-auto" style={{ height: 'calc(100% - 52px)' }}>
                            {project.tracks.map(track => (
                                <div key={track.id} className="flex border-b border-gray-700">
                                    <div className="w-32 p-2 bg-gray-900 border-r border-gray-700">
                                        <span className="text-sm">{track.name}</span>
                                    </div>
                                    <div className="flex-1 relative h-16">
                                        {track.clips.map(clip => (
                                            <div
                                                key={clip.id}
                                                className={`absolute h-14 top-1 rounded cursor-pointer timeline-clip ${
                                                    clip.type === 'audio' ? 'bg-green-600' :
                                                    clip.type === 'text' ? 'bg-purple-600' : 'bg-blue-600'
                                                } ${selectedClip && selectedClip.id === clip.id ? 'ring-2 ring-white' : ''}`}
                                                style={{
                                                    left: `${clip.position * zoom}px`,
                                                    width: `${(clip.outPoint - clip.inPoint) * zoom}px`
                                                }}
                                                onClick={() => setSelectedClip(clip)}
                                            >
                                                <span className="text-xs p-1 truncate block">
                                                    {clip.name}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    {/* Export Progress */}
                    {isExporting && (
                        <div className="fixed bottom-4 right-4 bg-gray-800 rounded-lg p-4 w-80 shadow-lg">
                            <div className="flex justify-between mb-2">
                                <span className="text-sm">エクスポート中...</span>
                                <span className="text-sm">{Math.round(exportProgress)}%</span>
                            </div>
                            <div className="w-full bg-gray-700 rounded-full h-2">
                                <div
                                    className="bg-blue-600 h-2 rounded-full transition-all"
                                    style={{ width: `${exportProgress}%` }}
                                />
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        
        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Artone />);
    </script>
</body>
</html>
