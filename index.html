<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Artone v3 - Browser-based professional video editor">
  <title>Artone v3</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fff; }
    #app { width: 100vw; height: 100vh; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .loading-spinner { width: 48px; height: 48px; border: 3px solid #333; border-top-color: #00C4CC; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading"><div class="loading-spinner"></div></div>
  </div>
  <script type="module" src="/app/entry.tsx"></script>
</body>
</html>
